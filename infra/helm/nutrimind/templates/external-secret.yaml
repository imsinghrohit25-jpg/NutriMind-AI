{{- if .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "nutrimind.fullname" . }}-env
  labels:
    {{- include "nutrimind.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreRef.name }}
    kind: {{ .Values.externalSecrets.secretStoreRef.kind }}
  target:
    name: {{ include "nutrimind.fullname" . }}-env
    creationPolicy: Owner
  data:
    - secretKey: SUPABASE_URL
      remoteRef: { key: nutrimind/{{ .Values.region.id }}, property: SUPABASE_URL }
    - secretKey: SUPABASE_SERVICE_ROLE_KEY
      remoteRef: { key: nutrimind/{{ .Values.region.id }}, property: SUPABASE_SERVICE_ROLE_KEY }
    - secretKey: SUPABASE_ANON_KEY
      remoteRef: { key: nutrimind/{{ .Values.region.id }}, property: SUPABASE_ANON_KEY }
    - secretKey: SUPABASE_JWKS_URL
      remoteRef: { key: nutrimind/{{ .Values.region.id }}, property: SUPABASE_JWKS_URL }
    - secretKey: DATABASE_URL
      remoteRef: { key: nutrimind/{{ .Values.region.id }}, property: DATABASE_URL }
    - secretKey: ANTHROPIC_API_KEY
      remoteRef: { key: nutrimind/{{ .Values.region.id }}, property: ANTHROPIC_API_KEY }
    - secretKey: OPENAI_API_KEY
      remoteRef: { key: nutrimind/{{ .Values.region.id }}, property: OPENAI_API_KEY }
    - secretKey: GEMINI_API_KEY
      remoteRef: { key: nutrimind/{{ .Values.region.id }}, property: GEMINI_API_KEY }
    - secretKey: LLM_MONTHLY_BUDGET_USD
      remoteRef: { key: nutrimind/{{ .Values.region.id }}, property: LLM_MONTHLY_BUDGET_USD }
{{- end }}
