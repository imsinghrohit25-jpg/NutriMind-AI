{{- if .Values.api.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "nutrimind.fullname" . }}-api
  labels:
    {{- include "nutrimind.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "nutrimind.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "nutrimind.labels" . | nindent 8 }}
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: {{ include "nutrimind.serviceAccountName" . }}
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["node", "apps/api/dist/apps/api/src/server.js"]
          ports:
            - name: http
              containerPort: {{ .Values.api.port }}
          envFrom:
            {{- include "nutrimind.envFrom" . | nindent 12 }}
          env:
            - name: API_PORT
              value: "{{ .Values.api.port }}"
            - name: NODE_ENV
              value: "production"
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          livenessProbe:
            httpGet: { path: /v1/health, port: http }
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            # /v1/ready (not /v1/health) — Phase 12 (§13.5): a DB blip should pull this pod out
            # of Service rotation, not restart it (liveness restarting fixes nothing when the
            # database, not the process, is the problem).
            httpGet: { path: /v1/ready, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities: { drop: ["ALL"] }
{{- end }}
