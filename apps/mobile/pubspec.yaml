name: nutrimind
description: "NutriMind AI — your AI-powered global nutrition companion"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Premium redesign (ADR-0034, ADR-0035, ADR-0036) — presentation-layer only.
  google_fonts: ^8.1.0
  flutter_animate: ^4.5.2
  fl_chart: ^1.2.0
  # Premium redesign Phase 4 (ADR-0040) — markdown rendering for the AI Diet Chat's real,
  # Output-Guard-validated finalText. `flutter_markdown` is discontinued upstream; this is its
  # actively-maintained pub.dev-listed replacement (verified live, not from training data).
  flutter_markdown_plus: ^1.0.12

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.7

  # Supabase (auth + realtime)
  supabase_flutter: ^2.5.6

  # HTTP client
  dio: ^5.7.0

  # Local SQLite database (offline-first)
  drift: ^2.18.0
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.25
  path_provider: ^2.1.5
  path: ^1.9.0

  # Scanner — on-device ML Kit (works offline)
  google_mlkit_barcode_scanning: ^0.13.0
  google_mlkit_text_recognition: ^0.14.0
  camera: ^0.11.0

  # Connectivity & offline
  connectivity_plus: ^6.0.5

  # Secure storage (tokens)
  flutter_secure_storage: ^9.2.2

  # Permissions
  permission_handler: ^11.3.1

  # Image compression (before upload)
  flutter_image_compress: ^2.3.0

  # Shared preferences (non-sensitive flags: consent, onboarding)
  shared_preferences: ^2.3.3

  # Logging
  logging: ^1.2.0

  # i18n
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # Health data — HealthKit (iOS) + Health Connect (Android)
  health: ^12.2.0

  # OAuth PKCE browser launch + PKCE challenge crypto
  url_launcher: ^6.3.0
  crypto: ^3.0.3

  # Image picker (lab report photo upload)
  image_picker: ^1.1.2

  # Voice logging (STT + TTS — on-device, no API)
  speech_to_text: ^7.0.0
  flutter_tts: ^4.2.0

  # Country resolution engine (Phase 10, `global.p10.country_onboarding_v2`) — CountryProfile,
  # countryProfileProvider, CountryResolutionChain. Not previously declared as a dependency of
  # this app despite being described as "the central spine of the Global Enterprise Edition"
  # (packages/country_engine's own doc comment) — nothing in apps/mobile had ever imported it.
  nutrimind_country_engine:
    path: ../../packages/country_engine

  # Found while verifying Phase 10's mobile changes: app.dart already imports this for
  # activeLocaleProvider/activeTextDirectionProvider but it was never declared as a dependency
  # here either — flutter analyze on app.dart failed outright. Fixed in passing (same one-line
  # shape as the country_engine addition above); see ADR-0023/ADR-0024.
  nutrimind_localization_engine:
    path: ../../packages/localization_engine

  # AI Memory System transparency screen (Phase 11, `global.p11.ai_memory_system`) needs
  # MemoryFact — first real mobile use of this package (previously an empty stub).
  nutrimind_ai_agent_layer:
    path: ../../packages/ai_agent_layer

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  drift_dev: ^2.18.0
  riverpod_generator: ^2.4.4
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.8

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/icons/

# ── Brand assets generation (Phase 5) ────────────────────────────────────────
# Source art produced by tool/generate_icon.py (deep-forest squircle + saffron-veined leaf).
# Regenerate platform icons:  dart run flutter_launcher_icons
# Regenerate native splash:    dart run flutter_native_splash:create
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#0D4422"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"
  remove_alpha_ios: true

flutter_native_splash:
  color: "#0B120D"
  image: assets/icon/app_icon_foreground.png
  android_12:
    color: "#0B120D"
    image: assets/icon/app_icon_foreground.png
  color_dark: "#0B120D"
  image_dark: assets/icon/app_icon_foreground.png
