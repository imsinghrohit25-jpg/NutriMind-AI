name: CI

on:
  push:
    branches: [main, 'feat/**', 'fix/**']
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── API ──────────────────────────────────────────────────────────────────────
  api:
    name: API — TypeScript + Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Run test suite
        run: npx vitest run --reporter=verbose

      # Gate: deterministic score engine — no LLM writes to score
      - name: Score engine audit (no LLM calls in engine.ts)
        run: |
          if grep -rn "gateway\|llm\|complete\|embed" src/engines/score/engine.ts; then
            echo "FAIL: LLM call found in score engine"
            exit 1
          fi
          echo "PASS: score engine is deterministic"

      # Gate: injection strings inert
      - name: Prompt injection test
        run: npx vitest run src/security/__tests__/prompt-injection.test.ts --reporter=verbose

  # ── Mobile ───────────────────────────────────────────────────────────────────
  mobile:
    name: Mobile — Flutter analyze + tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.x'
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: apps/mobile
        run: flutter pub get

      - name: Flutter analyze (0 issues required)
        working-directory: apps/mobile
        run: flutter analyze

      - name: Flutter tests
        working-directory: apps/mobile
        run: flutter test

  # ── Integration (emulator) ────────────────────────────────────────────────────
  integration:
    name: Integration — Android emulator
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [api, mobile]

    steps:
      - uses: actions/checkout@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.x'
          channel: stable
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Install dependencies
        working-directory: apps/mobile
        run: flutter pub get

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-34-x86_64

      - name: Create AVD
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          force-avd-creation: true
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
          disable-animations: true
          script: echo "AVD created"

      - name: Run integration tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          script: |
            cd apps/mobile
            flutter test integration_test/ --device-id emulator-5554

  # ── Security audit ────────────────────────────────────────────────────────────
  audit:
    name: Dependency audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/api/package-lock.json

      - name: npm audit (no high/critical)
        working-directory: apps/api
        run: npm audit --audit-level=high

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.x'
          channel: stable

      - name: Flutter pub audit
        working-directory: apps/mobile
        run: flutter pub deps
