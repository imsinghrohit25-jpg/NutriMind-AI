name: CI

on:
  push:
    branches: [main, 'feat/**', 'fix/**']
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── API ──────────────────────────────────────────────────────────────────────
  api:
    name: API — TypeScript + Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Run test suite
        run: npx vitest run --reporter=verbose

      # ── REGRESSION GATE (BLOCKING) — §1 protected features ──────────────────
      # This gate MUST pass on every PR. Failures block merge.
      - name: "GATE: Regression suite — Health Score Engine"
        run: npx vitest run src/engines/score/__tests__/engine.regression.test.ts --reporter=verbose

      - name: "GATE: Regression suite — Allergen detector"
        run: npx vitest run src/engines/allergen/__tests__/detector.regression.test.ts --reporter=verbose

      - name: "GATE: Regression suite — Allergen fail-safe"
        run: npx vitest run src/engines/allergen/__tests__/fail-safe.regression.test.ts --reporter=verbose

      - name: "GATE: Regression suite — Meal planner constraint validator"
        run: npx vitest run src/planner/__tests__/constraint-validator.regression.test.ts --reporter=verbose

      - name: "GATE: Regression suite — Hinglish Voice NLU"
        run: npx vitest run src/voice/__tests__/nlu.regression.test.ts --reporter=verbose

      - name: "GATE: Regression suite — Family Allergen Guardian"
        run: npx vitest run src/family/__tests__/allergen-guardian.regression.test.ts --reporter=verbose

      - name: "GATE: Regression suite — Feature flags defaults"
        run: npx vitest run src/routes/v1/__tests__/flags.regression.test.ts --reporter=verbose
      # ── END REGRESSION GATE ──────────────────────────────────────────────────

      # Gate: deterministic score engine — no LLM writes to score
      - name: Score engine audit (no LLM calls in engine.ts)
        run: |
          if grep -rn "gateway\|llm\|complete\|embed" src/engines/score/engine.ts; then
            echo "FAIL: LLM call found in score engine"
            exit 1
          fi
          echo "PASS: score engine is deterministic"

      # Gate: allergen engine — no LLM writes to allergen detection
      - name: "GATE: Allergen engine LLM-write audit"
        run: |
          if grep -rn "gateway\|llm\|complete\|embed" src/engines/allergen/; then
            echo "FAIL: LLM call found in allergen engine"
            exit 1
          fi
          echo "PASS: allergen engine is deterministic"

      # Gate: injection strings inert
      - name: Prompt injection test
        run: npx vitest run src/security/__tests__/prompt-injection.test.ts --reporter=verbose

  # ── Root workspaces (packages/shared, CI/infra scripts, Cloudflare Worker) ────
  # Phase 12 (§13.4): a separate root-level install/typecheck also proves the exact dependency
  # graph the Dockerfile builds from (apps/api's own job above installs scoped to apps/api,
  # which the container build does NOT do — it installs from the repo-root lockfile, which is
  # what caught the missing @supabase/supabase-js dependency and the Node-20-vs-22 requirement,
  # neither of which the apps/api-scoped job below could have surfaced on its own).
  root-workspaces:
    name: Root workspaces — typecheck + scripts/worker tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies (root, all workspaces)
        run: npm ci

      - name: Typecheck every workspace
        run: npm run typecheck --workspaces --if-present

      - name: Test CI/lint scripts (scripts/__tests__)
        run: npm run test:scripts

      - name: Test Cloudflare barcode edge cache worker
        run: npm run test --workspace=infra/cloudflare/barcode-edge-cache

  # ── Migrations — destructive DDL guard (§13.4 zero-downtime, expand-contract) ─
  # Blocks a migration ADDED in this PR/push from containing destructive DDL (DROP TABLE/COLUMN,
  # RENAME, TRUNCATE, a type change, or a NOT-NULL constraint with no safe backfill) unless it's
  # explicitly marked as an intentional contract-phase migration. Pre-Phase-12 migrations
  # (0017's DROP TABLE, 0020's RENAME COLUMN — both pre-launch, zero-production-data exceptions,
  # documented in their own ADRs) are never re-flagged: this only lints files ADDED relative to
  # the PR's base/previous push, not the full historical migration set.
  migrations-lint:
    name: Migrations — destructive DDL guard
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Determine diff base
        id: base
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.event.pull_request.base.sha }}" --depth=1
            echo "ref=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
          else
            git fetch origin "${{ github.event.before }}" --depth=1 || true
            echo "ref=${{ github.event.before || 'HEAD~1' }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Lint newly-added migrations for destructive DDL
        run: npx tsx scripts/lint-migrations.ts --since ${{ steps.base.outputs.ref }}

  # ── Mobile ───────────────────────────────────────────────────────────────────
  mobile:
    name: Mobile — Flutter analyze + tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.x'
          channel: stable
          cache: true

      - name: Install melos
        run: dart pub global activate melos

      - name: Melos bootstrap (link all packages)
        run: melos bootstrap

      - name: Install dependencies
        working-directory: apps/mobile
        run: flutter pub get

      - name: Flutter analyze (0 issues required)
        working-directory: apps/mobile
        run: flutter analyze

      - name: Flutter tests
        working-directory: apps/mobile
        run: flutter test

  # ── Integration (emulator) ────────────────────────────────────────────────────
  integration:
    name: Integration — Android emulator
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [api, mobile]

    steps:
      - uses: actions/checkout@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.x'
          channel: stable
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Install dependencies
        working-directory: apps/mobile
        run: flutter pub get

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-34-x86_64

      - name: Create AVD
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          force-avd-creation: true
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
          disable-animations: true
          script: echo "AVD created"

      - name: Run integration tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          script: |
            cd apps/mobile
            flutter test integration_test/ --device-id emulator-5554

  # ── Security audit ────────────────────────────────────────────────────────────
  audit:
    name: Dependency audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: npm audit (no high/critical)
        working-directory: apps/api
        run: npm audit --audit-level=high

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.x'
          channel: stable

      - name: Flutter pub audit
        working-directory: apps/mobile
        run: flutter pub deps
