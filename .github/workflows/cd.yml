name: CD

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'   # semantic version tags only

permissions:
  contents: read

jobs:
  # ── Backend (API + worker) → K8s canary ───────────────────────────────────────
  # Phase 12 (§13.4). Real, valid pipeline: image build/push to GHCR would work today (uses
  # GITHUB_TOKEN, no external account needed). The deploy steps need a real cluster's kubeconfig
  # (secrets.KUBE_CONFIG_AP_SOUTH_1) which does not exist in this environment (no K8s cluster is
  # provisioned anywhere yet — see docs/scale/limits.md) — the job detects that and skips the
  # deploy steps rather than failing the whole run or fabricating a "success."
  backend:
    name: Backend (API + Worker) → K8s canary (ap-south-1)
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          target: api
          push: true
          tags: ghcr.io/${{ github.repository }}/api:${{ github.ref_name }}

      - name: Build and push worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          target: worker
          push: true
          tags: ghcr.io/${{ github.repository }}/worker:${{ github.ref_name }}

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Configure kubeconfig
        id: kubeconfig
        run: |
          if [ -z "${{ secrets.KUBE_CONFIG_AP_SOUTH_1 }}" ]; then
            echo "::warning::KUBE_CONFIG_AP_SOUTH_1 is not set — no real K8s cluster provisioned yet (Phase 12 infra is real but undeployed here). Skipping the deploy steps; images above were still built and pushed."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG_AP_SOUTH_1 }}" | base64 -d > "$HOME/.kube/config"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Canary 5%
        if: steps.kubeconfig.outputs.skip != 'true'
        run: ./scripts/cd/deploy-canary.sh 5 ${{ github.ref_name }} 2

      - name: Canary 25%
        if: steps.kubeconfig.outputs.skip != 'true'
        run: ./scripts/cd/deploy-canary.sh 25 ${{ github.ref_name }} 2

      - name: Promote to 100%
        if: steps.kubeconfig.outputs.skip != 'true'
        run: ./scripts/cd/deploy-canary.sh 100 ${{ github.ref_name }} 2

  # ── Android release build ────────────────────────────────────────────────────
  android:
    name: Android AAB → Play Store (staged 10%)
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.x'
          channel: stable
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Setup Ruby (Fastlane)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: apps/mobile

      - name: Decode keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
        run: |
          echo "$KEYSTORE_B64" | base64 -d > apps/mobile/android/app/nutrimind.jks

      - name: Install Flutter dependencies
        working-directory: apps/mobile
        run: flutter pub get

      - name: Build AAB
        working-directory: apps/mobile
        env:
          KEY_ALIAS:         ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.ANDROID_KEY_PASSWORD }}
          STORE_PASSWORD:    ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          flutter build appbundle --release \
            --dart-define=SUPA_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPA_ANON=${{ secrets.SUPABASE_ANON_KEY }}

      - name: Upload to Play Store (staged 10%)
        working-directory: apps/mobile
        env:
          SUPPLY_JSON_KEY_DATA: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
        run: bundle exec fastlane android deploy_staged

  # ── iOS release build ─────────────────────────────────────────────────────────
  ios:
    name: iOS IPA → App Store (staged 10%)
    runs-on: macos-14
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.x'
          channel: stable
          cache: true

      - name: Setup Ruby (Fastlane)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: apps/mobile

      - name: Install Flutter dependencies
        working-directory: apps/mobile
        run: flutter pub get

      - name: Build IPA
        working-directory: apps/mobile
        env:
          MATCH_PASSWORD:         ${{ secrets.MATCH_PASSWORD }}
          FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          flutter build ios --release --no-codesign \
            --dart-define=SUPA_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPA_ANON=${{ secrets.SUPABASE_ANON_KEY }}
          bundle exec fastlane ios deploy_staged

      - name: Upload IPA to App Store
        working-directory: apps/mobile
        env:
          APP_STORE_CONNECT_API_KEY_ID:        ${{ secrets.ASC_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID:     ${{ secrets.ASC_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT:   ${{ secrets.ASC_KEY_CONTENT }}
        run: bundle exec fastlane ios upload_to_testflight
