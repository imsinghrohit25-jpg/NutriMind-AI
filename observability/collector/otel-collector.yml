receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 512
  memory_limiter:
    limit_mib: 256
    check_interval: 1s
  resource:
    attributes:
      - key: deployment.environment
        value: development
        action: upsert

exporters:
  otlp/jaeger:
    endpoint: jaeger:14268
    tls:
      insecure: true
  prometheus:
    endpoint: "0.0.0.0:8889"
    namespace: nutrimind
  debug:
    verbosity: normal

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch, resource]
      exporters: [otlp/jaeger, debug]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [prometheus]
