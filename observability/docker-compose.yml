version: '3.9'

services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.111.0
    command: ["--config=/etc/otel/config.yml"]
    volumes:
      - ./collector/otel-collector.yml:/etc/otel/config.yml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus metrics scrape endpoint
    restart: unless-stopped
    networks: [observability]

  prometheus:
    image: prom/prometheus:v2.55.0
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      # Phase 12 (§13.5): prometheus.yml's rule_files references alerting/slo-burn-rate.rules.yml
      # — found missing from this compose file while actually starting this stack to verify the
      # new rules load (only prometheus.yml itself was ever mounted; the rules directory was not,
      # so `rule_files` would have 404'd on container start with zero prior notice).
      - ./alerting:/etc/prometheus/alerting:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped
    networks: [observability]

  jaeger:
    image: jaegertracing/all-in-one:1.62
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"  # Jaeger UI
      - "14268:14268"  # HTTP collector
    restart: unless-stopped
    networks: [observability]

  grafana:
    image: grafana/grafana:11.3.0
    volumes:
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - grafana_data:/var/lib/grafana
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_SECURITY_ADMIN_PASSWORD=nutrimind
    ports:
      - "3001:3000"
    restart: unless-stopped
    depends_on: [prometheus]
    networks: [observability]

volumes:
  prometheus_data:
  grafana_data:

networks:
  observability:
    driver: bridge
